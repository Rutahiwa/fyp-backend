              adminNotes: Logged for product backlog.
      responses:
        "200":
          description: Feedback updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Feedback updated
                data: {}
      tags:
        - Admin
