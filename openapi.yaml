          name: type
          schema:
            type: string
            enum:
              - ANNOUNCEMENT
              - NOTICE
              - NEWS
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: isForYou
          schema:
            type: boolean
          description: Strict class-only feed (PROGRAMME_YEAR matches only)
      responses:
        "200":
          description: Personalized paginated feed with author, category, coverImage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - Announcements
    post:
      summary: Create an announcement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
                - type
                - audiences
              properties:
                title:
                  type: string
                content:
                  type: string
                excerpt:
                  type: string
                type:
                  type: string
                  enum:
                    - ANNOUNCEMENT
                    - NOTICE
                    - NEWS
                status:
                  type: string
                  enum:
                    - DRAFT
                    - PUBLISHED
                  default: DRAFT
                categoryId:
                  type: string
                  format: uuid
                coverImageId:
                  type: string
                  format: uuid
                academicYearId:
                  type: string
                  format: uuid
                audiences:
                  type: array
                  items:
                    type: object
                    properties:
                      targetType:
                        type: string
                        enum:
                          - ALL
                          - COLLEGE
                          - PROGRAMME
                          - PROGRAMME_YEAR
                          - ROLE
                      collegeId:
                        type: string
                        format: uuid
                      programmeId:
                        type: string
                        format: uuid
                      yearOfStudy:
                        type: integer
                      roleTarget:
                        type: string
                mediaIds:
                  type: array
                  items:
                    type: string
                    format: uuid
            example:
              title: End of semester exams
              content: <p>Please check the timetable on the notice board.</p>
              excerpt: Exam timetable published
              type: ANNOUNCEMENT
              status: PUBLISHED
              categoryId: a4444444-4444-4444-8444-444444444444
              audiences:
                - targetType: PROGRAMME_YEAR
                  programmeId: a3333333-3333-4333-8333-333333333333
                  yearOfStudy: 2
              mediaIds: []
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Announcement created
                data: {}
      tags:
        - Announcements
