openapi: 3.0.3
info:
  title: UDSM Information Dissemination Platform API
  version: 1.0.0
  description: Backend APIs for the UDSM Information Dissemination Platform. Built with Next.js App Router.
servers:
  - url: http://localhost:3000/api
    description: Local development server
    
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        registrationNumber:
          type: string
        email:
          type: string
        roleId:
          type: string
          format: uuid

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            pageSize: { type: integer }
            totalPages: { type: integer }
          
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new student
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, registrationNumber, course, sex, email, password]
              properties:
                fullName: { type: string }
                registrationNumber: { type: string }
                course: { type: string }
                sex: { type: string, enum: ["MALE", "FEMALE"] }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or Registration Number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Authenticate user and get JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials

  /auth/generate-otp:
    post:
      summary: Request an OTP for password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP generated and sent to email

  /auth/verify-otp:
    post:
      summary: Verify the OTP and get a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otpCode]
              properties:
                email: { type: string, format: email }
                otpCode: { type: string }
      responses:
        '200':
          description: Returns a short-lived reset token
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: object
                    properties:
                      resetToken: { type: string }

  /auth/reset-password:
    post:
      summary: Consume reset token to change password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetToken, newPassword]
              properties:
                resetToken: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Password reset successfully

  /auth/change-password:
    post:
      summary: Change password while authenticated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Password changed successfully

  /users:
    get:
      summary: Get paginated list of users (Admin only)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Paginated response of users
          
  /users/{id}:
    get:
      summary: Get user details by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User details
        '404':
          description: User not found
    put:
      summary: Update user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                roleId: { type: string, format: uuid }
                isActive: { type: boolean }
      responses:
        '200':
          description: User updated successfully
    delete:
      summary: Soft delete user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User deleted successfully
          
  /audit-logs:
    get:
      summary: Get paginated audit logs (Admin only)
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: userId
          schema: { type: string }
      responses:
        '200':
          description: Paginated response of audit logs

  /roles:
    get:
      summary: List all roles
      responses:
        '200':
          description: Successful response returning an array of roles
    post:
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                permissions: 
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '201':
          description: Role created successfully

  /roles/{id}:
    get:
      summary: Get role details including its associated permissions array
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role details and permissions array
        '404':
          description: Role not found
    put:
      summary: Update a role (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                permissions:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Role updated successfully
    delete:
      summary: Delete a role
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role deleted successfully

  /permissions:
    get:
      summary: Get all natively tracked system permissions
      responses:
        '200':
          description: Array of system permissions
          
  /permissions/{id}:
    get:
      summary: Get specific permission
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Permission details

  /colleges:
    get:
      summary: List all colleges
      responses:
        '200':
          description: Array of colleges
    post:
      summary: Create a college (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, shortName]
              properties:
                name: { type: string }
                shortName: { type: string }
      responses:
        '201':
          description: College created

  /programmes:
    get:
      summary: List all programmes (paginated, filterable by collegeId)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collegeId
          schema: { type: string, format: uuid }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of programmes with college info
    post:
      summary: Create a programme (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [collegeId, name, code, durationYears]
              properties:
                collegeId: { type: string, format: uuid }
                name: { type: string }
                code: { type: string }
                durationYears: { type: integer }
      responses:
        '201':
          description: Programme created

  /programmes/{id}:
    get:
      summary: Get programme details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Programme details
    put:
      summary: Update a programme (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Programme updated
    delete:
      summary: Soft delete a programme (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Programme deleted

  /academic-years:
    get:
      summary: List academic years (paginated)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of academic years
    post:
      summary: Create an academic year (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, startDate, endDate]
              properties:
                label: { type: string }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
      responses:
        '201':
          description: Academic year created

  /academic-years/current:
    get:
      summary: Get the current academic year
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current academic year

  /academic-years/{id}:
    get:
      summary: Get academic year details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Academic year details
    put:
      summary: Update an academic year (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Academic year updated

  /academic-years/{id}/set-current:
    post:
      summary: Set academic year as current (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Academic year set as current

  /lecturer-assignments:
    get:
      summary: List lecturer assignments (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated list with user/programme/year joins
    post:
      summary: Assign a lecturer to a class (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lecturerId, programmeId, yearOfStudy, semester, subjectName, academicYearId]
              properties:
                lecturerId: { type: string, format: uuid }
                programmeId: { type: string, format: uuid }
                yearOfStudy: { type: integer }
                semester: { type: integer }
                subjectName: { type: string }
                academicYearId: { type: string, format: uuid }
      responses:
        '201':
          description: Lecturer assigned

  /lecturer-assignments/{id}:
    delete:
      summary: Remove a lecturer assignment (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Assignment removed

  /cr-assignments:
    get:
      summary: List CR assignments (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated list with user/programme/year joins
    post:
      summary: Assign a class representative (admin, max 2 per class)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, programmeId, yearOfStudy, academicYearId]
              properties:
                userId: { type: string, format: uuid }
                programmeId: { type: string, format: uuid }
                yearOfStudy: { type: integer }
                academicYearId: { type: string, format: uuid }
      responses:
        '201':
          description: CR assigned

  /cr-assignments/{id}:
    delete:
      summary: Remove a CR assignment (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: CR assignment removed

  /auth/change-email-request:
    post:
      summary: Request email change (sends OTP to new email)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newEmail]
              properties:
                newEmail: { type: string, format: email }
      responses:
        '200':
          description: Verification code sent

  /auth/change-email-verify:
    post:
      summary: Verify OTP and update email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newEmail, otpCode]
              properties:
                newEmail: { type: string, format: email }
                otpCode: { type: string }
      responses:
        '200':
          description: Email changed

  /media/upload:
    post:
      summary: Upload a file (images, video, PDF)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      url: { type: string }
                      type: { type: string }
                      mimeType: { type: string }
                      sizeBytes: { type: integer }
                      filename: { type: string }

  /categories:
    get:
      summary: List categories (filterable by module)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: module
          schema: { type: string, enum: [ANNOUNCEMENT, LOST_FOUND, FEEDBACK] }
      responses:
        '200':
          description: Array of categories
    post:
      summary: Create a category (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, module]
              properties:
                name: { type: string }
                module: { type: string, enum: [ANNOUNCEMENT, LOST_FOUND, FEEDBACK] }
      responses:
        '201':
          description: Category created

  /event-categories:
    get:
      summary: List event categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of event categories with iconName
    post:
      summary: Create an event category (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                iconName: { type: string }
      responses:
        '201':
          description: Event category created

  /announcements:
    get:
      summary: Get personalized announcement feed
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: type
          schema: { type: string, enum: [ANNOUNCEMENT, NOTICE, NEWS] }
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: isForYou
          schema: { type: boolean }
          description: Strict class-only feed (PROGRAMME_YEAR matches only)
      responses:
        '200':
          description: Personalized paginated feed with author, category, coverImage
    post:
      summary: Create an announcement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, type, audiences]
              properties:
                title: { type: string }
                content: { type: string }
                excerpt: { type: string }
                type: { type: string, enum: [ANNOUNCEMENT, NOTICE, NEWS] }
                status: { type: string, enum: [DRAFT, PUBLISHED], default: DRAFT }
                categoryId: { type: string, format: uuid }
                coverImageId: { type: string, format: uuid }
                academicYearId: { type: string, format: uuid }
                audiences:
                  type: array
                  items:
                    type: object
                    properties:
                      targetType: { type: string, enum: [ALL, COLLEGE, PROGRAMME, PROGRAMME_YEAR, ROLE] }
                      collegeId: { type: string, format: uuid }
                      programmeId: { type: string, format: uuid }
                      yearOfStudy: { type: integer }
                      roleTarget: { type: string }
                mediaIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '201':
          description: Announcement created

  /announcements/{id}:
    get:
      summary: Get announcement details (increments viewCount)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Full announcement with audiences and media
    put:
      summary: Update announcement (owner or admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Announcement updated
    delete:
      summary: Soft delete announcement
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Announcement deleted

  /announcements/{id}/pin:
    post:
      summary: Toggle announcement pin status (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pin toggled

  /stories:
    get:
      summary: List active stories (non-expired)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active stories with hasViewed flag, author, college, and media
    post:
      summary: Create a story (admin/staff)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaId]
              properties:
                collegeId: { type: string, format: uuid }
                mediaId: { type: string, format: uuid }
                caption: { type: string }
                backgroundColor: { type: string }
                linkUrl: { type: string }
                linkText: { type: string }
      responses:
        '201':
          description: Story created (expiresAt auto-set to +24h)

  /stories/{id}:
    delete:
      summary: Soft delete a story (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Story deleted

  /stories/{id}/view:
    post:
      summary: Mark story as viewed by current user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: View recorded

  /announcements/{id}/comments:
    get:
      summary: List comments on an announcement
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Array of comments with author info, newest first
    post:
      summary: Post a comment on an announcement
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201':
          description: Comment posted with author info

  /announcements/{id}/comments/{commentId}:
    delete:
      summary: Delete a comment (owner or admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: commentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Comment deleted

  /announcements/{id}/reactions:
    post:
      summary: Toggle like on an announcement (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Reaction toggled (liked/unliked)

  /events:
    get:
      summary: List events (filterable, paginated)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [DRAFT, PUBLISHED, CANCELLED, ALL], default: PUBLISHED }
        - in: query
          name: upcoming
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated events with goingCount, organizer, category, coverImage
    post:
      summary: Create an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, categoryId, startDateTime, endDateTime]
              properties:
                title: { type: string }
                description: { type: string }
                categoryId: { type: string, format: uuid }
                status: { type: string, enum: [DRAFT, PUBLISHED, CANCELLED] }
                location: { type: string }
                locationUrl: { type: string }
                startDateTime: { type: string, format: date-time }
                endDateTime: { type: string, format: date-time }
                maxAttendees: { type: integer }
                coverImageId: { type: string, format: uuid }
