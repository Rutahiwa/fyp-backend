                  type: string
                  enum:
                    - HOSTEL
                    - HOSTEL_BLOCK
                    - CLUB
                    - FINANCIAL
                    - CUSTOM
                parentId:
                  type: string
                  format: uuid
                description:
                  type: string
            example:
              name: Chess Club
              type: CLUB
              description: UDSM chess society
      tags:
        - Groups
