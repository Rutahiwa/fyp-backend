  /feedback:
    get:
      summary: List current user's feedback submissions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of user's feedback with status and admin notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: bbbbbbbb-bbbb-4bbb-8bbb-bbbbbbbbbbbb
                    subject: App suggestion
                    status: PENDING
                    description: Dark mode would help.
      tags:
        - Feedback
    post:
      summary: Submit feedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryId
                - subject
                - description
              properties:
                categoryId:
                  type: string
                  format: uuid
                subject:
                  type: string
                description:
                  type: string
            example:
              categoryId: cccccccc-cccc-4ccc-8ccc-cccccccccccc
              subject: App suggestion
              description: Dark mode would be helpful on the mobile app.
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Feedback submitted
                data: {}
      tags:
        - Feedback
  /admin/feedback:
    get:
      summary: List all feedback submissions (admin, filterable by status)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - PENDING
              - REVIEWED
              - RESOLVED
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of all feedback with user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - Admin
  /admin/feedback/{id}:
    put:
      summary: Update feedback status and admin notes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - PENDING
                    - REVIEWED
                    - RESOLVED
                adminNotes:
                  type: string
            example:
