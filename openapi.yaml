openapi: 3.0.3
info:
  title: UDSM Information Dissemination Platform API
  version: 1.0.0
  description: Backend APIs for the UDSM Information Dissemination Platform. Built with Next.js App Router.
servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://fyp-backend-pi-one.vercel.app/api
    description: Production development server
tags:
  - name: Authentication
    description: Registration, login, JWT, password reset, and email change
  - name: Users
    description: Profiles and admin user directory
  - name: RBAC & Audit
    description: Roles, permissions, and audit log
  - name: Colleges & Programmes
    description: Colleges and degree programmes
  - name: Academic years
    description: Academic year configuration
  - name: Assignments
    description: Lecturer and class representative assignments
  - name: Media
    description: File uploads (images, PDF, video)
  - name: Categories
    description: Content categories for announcements, events, and feedback
  - name: Announcements
    description: Announcements, comments, and reactions
  - name: Stories
    description: 24-hour stories
  - name: Events
    description: Events, RSVP, attendees, comments, and reactions
  - name: Lost & Found
    description: Lost and found listings
  - name: Feedback
    description: User feedback submissions
  - name: Posts
    description: Targeted posts feed (college, department, programme, groups)
  - name: Groups
    description: Audience segments (clubs, hostels, financial, custom)
  - name: Admin
    description: Admin-only operations
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        registrationNumber:
          type: string
        email:
          type: string
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: >-
            Response payload; shape varies (object, array, or nested fields per endpoint). See examples on each
            operation.
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            totalPages:
              type: integer
      example:
        success: true
        message: Success
        data:
          id: a1111111-1111-4111-8111-111111111111
          fullName: Jane Student
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
      example:
        success: false
        message: Validation failed
        errors:
          email: Invalid email format
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new student
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - registrationNumber
                - course
                - sex
                - email
                - password
              properties:
                fullName:
                  type: string
                registrationNumber:
                  type: string
                course:
                  type: string
                sex:
                  type: string
                  enum:
                    - MALE
                    - FEMALE
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              fullName: Jane Student
              registrationNumber: 2021-04-12345
              course: BSc Computer Science
              sex: FEMALE
              email: jane@student.udsm.ac.tz
              password: SecurePass1!
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: User registered successfully
                data:
                  id: a1111111-1111-4111-8111-111111111111
                  fullName: Jane Student
                  email: jane@student.udsm.ac.tz
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: Validation error
                errors: {}
        "409":
          description: Email or Registration Number already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: Email or Registration Number already exists
                errors: {}
      tags:
        - Authentication
  /auth/login:
    post:
      summary: Authenticate user and get JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: jane@student.udsm.ac.tz
              password: SecurePass1!
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    required:
                      - token
                      - user
                    properties:
                      token:
                        type: string
                      user:
                        $ref: "#/components/schemas/User"
              example:
                success: true
                message: Login successful
                data:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                    email: jane@student.udsm.ac.tz
                    roleId: a5555555-5555-4555-8555-555555555555
                    roleName: STUDENT
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: Invalid credentials
                errors: {}
      tags:
        - Authentication
  /auth/generate-otp:
    post:
      summary: Request an OTP for password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
            example:
              email: jane@student.udsm.ac.tz
      responses:
        "200":
          description: OTP generated and sent to email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: OTP generated and sent to email
                data: {}
      tags:
        - Authentication
  /auth/verify-otp:
    post:
      summary: Verify the OTP and get a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otpCode
              properties:
                email:
                  type: string
                  format: email
                otpCode:
                  type: string
            example:
              email: jane@student.udsm.ac.tz
              otpCode: "123456"
      responses:
        "200":
          description: Returns a short-lived reset token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      resetToken:
                        type: string
              example:
                success: true
                message: OTP verified
                data:
                  resetToken: short-lived-reset-token-abc123
      tags:
        - Authentication
  /auth/reset-password:
    post:
      summary: Consume reset token to change password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resetToken
                - newPassword
              properties:
                resetToken:
                  type: string
                newPassword:
                  type: string
            example:
              resetToken: short-lived-reset-token-from-verify-otp
              newPassword: NewSecurePass1!
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Password reset successfully
                data: {}
      tags:
        - Authentication
  /auth/change-password:
    post:
      summary: Change password while authenticated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
            example:
              currentPassword: SecurePass1!
              newPassword: NewSecurePass1!
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Password changed successfully
                data: {}
      tags:
        - Authentication
  /users:
    get:
      summary: Get paginated list of users (Admin only)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Paginated response of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - Users
  /users/{id}:
    get:
      summary: Get user details by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: User details
                data: {}
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: User not found
                errors: {}
      tags:
        - Users
    put:
      summary: Update user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                roleId:
                  type: string
                  format: uuid
                isActive:
                  type: boolean
            example:
              fullName: Jane Student Updated
              roleId: a5555555-5555-4555-8555-555555555555
              isActive: true
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: User updated successfully
                data: {}
      tags:
        - Users
    delete:
      summary: Soft delete user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: User deleted successfully
                data: {}
      tags:
        - Users
  /audit-logs:
    get:
      summary: Get paginated audit logs (Admin only)
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: string
      responses:
        "200":
          description: Paginated response of audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - RBAC & Audit
  /roles:
    get:
      summary: List all roles
      responses:
        "200":
          description: Successful response returning an array of roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a5555555-5555-4555-8555-555555555555
                    name: STUDENT
                    description: Default student role
      tags:
        - RBAC & Audit
    post:
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                    format: uuid
            example:
              name: custom_analyst
              description: Read-only analytics
              permissions:
                - a6666666-6666-4666-8666-666666666666
      responses:
        "201":
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Role created successfully
                data: {}
      tags:
        - RBAC & Audit
  /roles/{id}:
    get:
      summary: Get role details including its associated permissions array
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role details and permissions array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Role details and permissions array
                data: {}
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: Role not found
                errors: {}
      tags:
        - RBAC & Audit
    put:
      summary: Update a role (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                    format: uuid
            example:
              name: custom_analyst
              description: Updated description
              permissions:
                - a6666666-6666-4666-8666-666666666666
      responses:
        "200":
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Role updated successfully
                data: {}
      tags:
        - RBAC & Audit
    delete:
      summary: Delete a role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Role deleted successfully
                data: {}
      tags:
        - RBAC & Audit
  /permissions:
    get:
      summary: Get all natively tracked system permissions
      responses:
        "200":
          description: Array of system permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a6666666-6666-4666-8666-666666666666
                    name: user.read
                    description: List users
      tags:
        - RBAC & Audit
  /permissions/{id}:
    get:
      summary: Get specific permission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Permission details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Permission details
                data: {}
      tags:
        - RBAC & Audit
  /colleges:
    get:
      summary: List all colleges
      responses:
        "200":
          description: Array of colleges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a2222222-2222-4222-8222-222222222222
                    name: College of Engineering and Technology
                    shortName: COET
      tags:
        - Colleges & Programmes
    post:
      summary: Create a college (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - shortName
              properties:
                name:
                  type: string
                shortName:
                  type: string
            example:
              name: College of Engineering and Technology
              shortName: COET
      responses:
        "201":
          description: College created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: College created
                data: {}
      tags:
        - Colleges & Programmes
  /departments:
    get:
      summary: List departments (public; filter with ?collegeId=)
      parameters:
        - in: query
          name: collegeId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Departments with parent college names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: d1111111-1111-4111-8111-111111111111
                    collegeId: a2222222-2222-4222-8222-222222222222
                    name: Computer Science and Information Technology
                    shortName: CoICT-CSIT
                    collegeName: College of Information and Communication Technologies
                    collegeShortName: CoICT
      tags:
        - Colleges & Programmes
    post:
      summary: Create a department (requires college.manage)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - collegeId
                - name
                - shortName
              properties:
                collegeId:
                  type: string
                  format: uuid
                name:
                  type: string
                shortName:
                  type: string
            example:
              collegeId: a2222222-2222-4222-8222-222222222222
              name: Computer Science and Information Technology
              shortName: CoICT-CSIT
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Department created
                data: {}
      tags:
        - Colleges & Programmes
  /programmes:
    get:
      summary: List all programmes (paginated; filter by college via ?collegeId= — resolves through department → college)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collegeId
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list with department and college fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - Colleges & Programmes
    post:
      summary: Create a programme (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - departmentId
                - name
                - code
                - durationYears
              properties:
                departmentId:
                  type: string
                  format: uuid
                name:
                  type: string
                code:
                  type: string
                durationYears:
                  type: integer
            example:
              departmentId: d1111111-1111-4111-8111-111111111111
              name: Computer Science and Engineering
              code: CSE-BSC
              durationYears: 4
      responses:
        "201":
          description: Programme created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Programme created
                data: {}
      tags:
        - Colleges & Programmes
  /programmes/{id}:
    get:
      summary: Get programme details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Programme details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Programme details
                data: {}
      tags:
        - Colleges & Programmes
    put:
      summary: Update a programme (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Programme updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Programme updated
                data: {}
      tags:
        - Colleges & Programmes
    delete:
      summary: Soft delete a programme (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Programme deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Programme deleted
                data: {}
      tags:
        - Colleges & Programmes
  /academic-years:
    get:
      summary: List academic years (paginated)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of academic years
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  - id: a1111111-1111-4111-8111-111111111111
                    fullName: Jane Student
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
      tags:
        - Academic years
    post:
      summary: Create an academic year (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - startDate
                - endDate
              properties:
                label:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
            example:
              label: 2025/2026
              startDate: "2025-10-01"
              endDate: "2026-07-31"
      responses:
        "201":
          description: Academic year created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Academic year created
                data: {}
      tags:
        - Academic years
  /academic-years/current:
    get:
      summary: Get the current academic year
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: Success
                data:
                  id: a7777777-7777-4777-8777-777777777777
                  label: 2025/2026
                  isCurrent: true
                  startDate: "2025-10-01"
                  endDate: "2026-07-31"
      tags:
        - Academic years
  /academic-years/{id}:
    get:
      summary: Get academic year details
      security:
        - bearerAuth: []
      parameters:
