openapi: 3.0.3
info:
  title: UDSM Information Dissemination Platform API
  version: 1.0.0
  description: Backend APIs for the UDSM Information Dissemination Platform. Built with Next.js App Router.
servers:
  - url: http://localhost:3000/api
    description: Local development server
    
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        registrationNumber:
          type: string
        email:
          type: string
        roleId:
          type: string
          format: uuid

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            pageSize: { type: integer }
            totalPages: { type: integer }
          
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new student
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, registrationNumber, course, sex, email, password]
              properties:
                fullName: { type: string }
                registrationNumber: { type: string }
                course: { type: string }
                sex: { type: string, enum: ["MALE", "FEMALE"] }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or Registration Number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Authenticate user and get JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials

  /auth/generate-otp:
    post:
      summary: Request an OTP for password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP generated and sent to email

  /auth/verify-otp:
    post:
      summary: Verify the OTP and get a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otpCode]
              properties:
                email: { type: string, format: email }
                otpCode: { type: string }
      responses:
        '200':
          description: Returns a short-lived reset token
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: object
                    properties:
                      resetToken: { type: string }

  /auth/reset-password:
    post:
      summary: Consume reset token to change password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetToken, newPassword]
              properties:
                resetToken: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Password reset successfully

  /auth/change-password:
    post:
      summary: Change password while authenticated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Password changed successfully

  /users:
    get:
      summary: Get paginated list of users (Admin only)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Paginated response of users
          
  /users/{id}:
    get:
      summary: Get user details by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User details
        '404':
          description: User not found
    put:
      summary: Update user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                roleId: { type: string, format: uuid }
                isActive: { type: boolean }
      responses:
        '200':
          description: User updated successfully
    delete:
      summary: Soft delete user (Admin or Self)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User deleted successfully
          
  /audit-logs:
    get:
      summary: Get paginated audit logs (Admin only)
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: userId
          schema: { type: string }
      responses:
        '200':
          description: Paginated response of audit logs

  /roles:
    get:
      summary: List all roles
      responses:
        '200':
          description: Successful response returning an array of roles
    post:
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                permissions: 
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '201':
          description: Role created successfully

  /roles/{id}:
    get:
      summary: Get role details including its associated permissions array
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role details and permissions array
        '404':
          description: Role not found
    put:
      summary: Update a role (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                permissions:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Role updated successfully
    delete:
      summary: Delete a role
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role deleted successfully

  /permissions:
    get:
      summary: Get all natively tracked system permissions
      responses:
        '200':
          description: Array of system permissions
          
  /permissions/{id}:
    get:
      summary: Get specific permission
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Permission details
